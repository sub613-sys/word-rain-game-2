<script src="/socket.io/socket.io.js"></script>

<h2>💖 Teacher Control</h2>

<textarea id="words" rows="12" cols="40"></textarea>

<br>

게임시간
<input id="time" value="180">

<br>

<button onclick="setWords()">단어 설정</button>
<button onclick="start()">게임 시작</button>

<div id="qr"></div>

<script>

const socket=io()

function setWords(){

const lines=document.getElementById("words").value.split("\n")

const list=lines.map(l=>{
const [w,m]=l.split("=")
return {word:w,meaning:m}
})

socket.emit("setWords",list)

}

function start(){

const t=document.getElementById("time").value

socket.emit("startGame",t)

}

</script>
